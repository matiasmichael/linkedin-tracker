<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn Tracker</title>
  <style>
    :root {
      --blue: #0a66c2;
      --blue-dark: #084d94;
      --blue-light: #eff6ff;
      --surface: #ffffff;
      --bg: #f0f4f8;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --faint: #94a3b8;
      --green: #10b981;
      --red: #ef4444;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.05);
      --shadow-lg: 0 12px 40px rgba(10,102,194,.14), 0 4px 12px rgba(0,0,0,.06);
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 40px; height: 64px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 50; box-shadow: var(--shadow-sm); }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 32px; height: 32px; background: var(--blue); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    header h1 { font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .stat-pill { background: var(--blue-light); color: var(--blue); padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .add-btn { background: var(--blue); color: #fff; border: none; padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background .15s, transform .1s; }
    .add-btn:hover { background: var(--blue-dark); transform: translateY(-1px); }
    .container { max-width: 1140px; margin: 0 auto; padding: 40px 24px 80px; }
    .section-label { font-size: 11px; font-weight: 700; color: var(--faint); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 20px; }
    .personas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
    .persona-card { background: var(--surface); border-radius: var(--radius); padding: 28px 24px 24px; cursor: pointer; border: 1.5px solid var(--border); transition: all .2s cubic-bezier(.22,.68,0,1.2); display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px; position: relative; overflow: hidden; }
    .persona-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--blue), #0ea5e9); opacity: 0; transition: opacity .2s; }
    .persona-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--blue); }
    .persona-card:hover::before { opacity: 1; }
    .avatar-wrap { position: relative; margin-bottom: 4px; }
    .avatar { width: 76px; height: 76px; border-radius: 50%; background: linear-gradient(135deg, var(--blue), #0ea5e9); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800; color: #fff; flex-shrink: 0; overflow: hidden; border: 3px solid #fff; box-shadow: 0 0 0 2px var(--blue); }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .online-dot { position: absolute; bottom: 2px; right: 2px; width: 14px; height: 14px; background: var(--green); border-radius: 50%; border: 2px solid var(--surface); }
    .persona-name { font-size: 16px; font-weight: 700; color: var(--text); }
    .persona-title { font-size: 12px; color: var(--muted); line-height: 1.5; max-width: 200px; }
    .persona-meta { display: flex; gap: 16px; margin-top: 6px; }
    .persona-stat { font-size: 12px; color: var(--muted); display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .persona-stat strong { font-size: 18px; font-weight: 800; color: var(--blue); line-height: 1; }
    .monitored-badge { display: inline-flex; align-items: center; gap: 5px; background: #f0fdf4; color: var(--green); font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; margin-top: 2px; }
    .monitored-badge::before { content: '●'; font-size: 8px; }
    .add-card { border: 2px dashed var(--border); background: transparent; color: var(--faint); }
    .add-card:hover { border-color: var(--blue); color: var(--blue); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .add-card:hover::before { opacity: 0; }
    .add-icon { font-size: 32px; line-height: 1; margin-bottom: 4px; }
    #posts-view { display: none; animation: fadeIn .2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .back-btn { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; margin-bottom: 24px; transition: color .15s; }
    .back-btn:hover { color: var(--blue); }
    .person-header { display: flex; align-items: center; gap: 24px; margin-bottom: 32px; background: var(--surface); border-radius: var(--radius); padding: 28px 32px; border: 1.5px solid var(--border); box-shadow: var(--shadow-sm); flex-wrap: wrap; position: relative; overflow: hidden; }
    .person-header::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--blue), #0ea5e9); }
    .person-header .avatar { width: 72px; height: 72px; font-size: 24px; }
    .person-header-info h2 { font-size: 22px; font-weight: 800; letter-spacing: -.3px; }
    .person-header-info .subtitle { font-size: 14px; color: var(--muted); margin-top: 3px; }
    .person-header-info a { font-size: 12px; color: var(--blue); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-top: 8px; font-weight: 600; }
    .person-header-info a:hover { text-decoration: underline; }
    .header-stats { margin-left: auto; display: flex; gap: 32px; }
    .hstat { text-align: center; }
    .hstat strong { font-size: 28px; font-weight: 900; color: var(--blue); display: block; letter-spacing: -1px; }
    .hstat span { font-size: 11px; color: var(--faint); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
    .posts-list { display: flex; flex-direction: column; gap: 14px; }
    .post-card { background: var(--surface); border-radius: 14px; padding: 24px; border: 1.5px solid var(--border); transition: box-shadow .15s, border-color .15s; }
    .post-card:hover { box-shadow: var(--shadow-md); border-color: #cbd5e1; }
    .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .post-avatar { width: 36px; height: 36px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: linear-gradient(135deg, var(--blue), #0ea5e9); }
    .post-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .post-meta-info { flex: 1; }
    .post-author { font-size: 13px; font-weight: 700; }
    .post-date { font-size: 12px; color: var(--faint); margin-top: 1px; }
    .post-type-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; padding: 3px 8px; border-radius: 6px; background: var(--blue-light); color: var(--blue); }
    .post-type-badge.repost { background: #fef3c7; color: #d97706; }
    .post-text { font-size: 14px; line-height: 1.7; color: var(--text); white-space: pre-wrap; word-break: break-word; }
    .post-text.collapsed { display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }
    .read-more { font-size: 13px; color: var(--blue); cursor: pointer; font-weight: 600; margin-top: 8px; display: inline-block; }
    .read-more:hover { text-decoration: underline; }
    .post-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 18px; padding-top: 14px; border-top: 1px solid #f1f5f9; flex-wrap: wrap; gap: 10px; }
    .post-stats { display: flex; gap: 18px; }
    .stat-item { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--muted); font-weight: 500; }
    .post-link { font-size: 12px; font-weight: 700; color: var(--blue); text-decoration: none; padding: 6px 16px; border: 1.5px solid var(--blue); border-radius: 20px; transition: all .15s; }
    .post-link:hover { background: var(--blue); color: #fff; }
    .loading { text-align: center; padding: 80px 20px; color: var(--muted); font-size: 15px; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 60px 20px; color: var(--faint); font-size: 15px; }
    .error-msg { text-align: center; padding: 32px 20px; color: var(--red); font-size: 14px; background: #fef2f2; border-radius: 12px; border: 1px solid #fecaca; line-height: 1.6; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.5); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: 20px; padding: 40px; width: 100%; max-width: 480px; margin: 20px; box-shadow: 0 24px 80px rgba(0,0,0,.2); animation: modalIn .2s cubic-bezier(.22,.68,0,1.2); }
    @keyframes modalIn { from { opacity: 0; transform: scale(.95) translateY(10px); } to { opacity: 1; transform: none; } }
    .modal h3 { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
    .modal p { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
    .modal-input-wrap { position: relative; margin-bottom: 16px; }
    .modal-input-wrap .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--faint); font-size: 15px; pointer-events: none; }
    .modal input { width: 100%; border: 1.5px solid var(--border); border-radius: 12px; padding: 13px 16px 13px 42px; font-size: 14px; outline: none; transition: border-color .15s, box-shadow .15s; background: var(--bg); color: var(--text); }
    .modal input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(10,102,194,.12); background: #fff; }
    .modal input::placeholder { color: var(--faint); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .modal-cancel { background: none; border: 1.5px solid var(--border); color: var(--muted); padding: 10px 22px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .modal-submit { background: var(--blue); color: #fff; border: none; padding: 10px 26px; border-radius: 20px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background .15s; }
    .modal-submit:hover { background: var(--blue-dark); }
    .modal-submit:disabled { opacity: .55; cursor: not-allowed; }
    .modal-status { font-size: 13px; margin-top: 14px; padding: 11px 16px; border-radius: 10px; display: none; line-height: 1.5; font-weight: 500; }
    .modal-status.info { background: var(--blue-light); color: var(--blue); display: block; }
    .modal-status.error { background: #fef2f2; color: var(--red); display: block; }
    .modal-status.success { background: #f0fdf4; color: var(--green); display: block; }
    @media (max-width: 640px) {
      header { padding: 0 20px; }
      .container { padding: 24px 16px 60px; }
      .personas-grid { grid-template-columns: 1fr 1fr; gap: 14px; }
      .persona-card { padding: 20px 16px; }
      .person-header { padding: 20px; }
      header h1 { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
    </div>
    <h1>LinkedIn Tracker</h1>
  </div>
  <div class="header-right">
    <span id="stats-chip" class="stat-pill">Loading…</span>
    <button class="add-btn" onclick="openModal()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
      Add Person
    </button>
  </div>
</header>

<div class="container">
  <div id="personas-view">
    <div class="section-label">Monitored Profiles</div>
    <div class="personas-grid" id="personas-grid">
      <div class="loading"><div class="spinner"></div>Loading…</div>
    </div>
  </div>
  <div id="posts-view">
    <div class="back-btn" onclick="showPersonas()">← All profiles</div>
    <div class="person-header" id="person-header"></div>
    <div class="section-label" id="posts-label" style="display:none">Recent Posts</div>
    <div class="posts-list" id="posts-list">
      <div class="loading"><div class="spinner"></div>Loading posts…</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>Track a new person</h3>
    <p>Paste their LinkedIn profile URL. We’ll scrape their posts and add them to the daily monitor.</p>
    <div class="modal-input-wrap">
      <span class="input-icon">🔗</span>
      <input type="url" id="modal-url" placeholder="https://www.linkedin.com/in/username" />
    </div>
    <div id="modal-status" class="modal-status"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-submit" id="modal-submit-btn" onclick="submitAddPerson()">Start Tracking</button>
    </div>
  </div>
</div>

<script>
  const BASE = './data';
  const API  = 'http://46.101.143.130:8766';
  const _personas = {};

  function initials(name) {
    return (name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  }
  function timeAgo(ds) {
    if (!ds) return '';
    const d = new Date(ds); if (isNaN(d)) return ds;
    const s = Math.floor((Date.now()-d)/1000);
    if (s<3600) return Math.floor(s/60)+'m ago';
    if (s<86400) return Math.floor(s/3600)+'h ago';
    if (s<604800) return Math.floor(s/86400)+'d ago';
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  }
  function fmt(n){return(n||0).toLocaleString();}
  function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  function avatarHTML(p, size) {
    const s = size ? `style="width:${size}px;height:${size}px;font-size:${Math.round(size*.35)}px"` : '';
    if (p && p.profile_picture) {
      return `<div class="avatar" ${s}><img src="${esc(p.profile_picture)}" alt="${esc(p.name||'')}" onerror="this.parentNode.innerHTML='${initials(p.name)}'"/></div>`;
    }
    return `<div class="avatar" ${s}>${initials(p&&p.name)}</div>`;
  }

  function showPersonas() {
    document.getElementById('personas-view').style.display='block';
    document.getElementById('posts-view').style.display='none';
  }

  async function loadPersonas() {
    const grid = document.getElementById('personas-grid');
    try {
      const [personas, stats] = await Promise.all([
        fetch(BASE+'/personas.json?_='+Date.now()).then(r=>{if(!r.ok)throw new Error('personas '+r.status);return r.json();}),
        fetch(BASE+'/stats.json?_='+Date.now()).then(r=>{if(!r.ok)throw new Error('stats '+r.status);return r.json();})
      ]);
      document.getElementById('stats-chip').textContent =
        stats.total_personas+' persona'+(stats.total_personas!==1?'s':'')+' \u00b7 '+stats.total_posts+' posts';
      personas.forEach(p=>_personas[p.username]=p);
      grid.innerHTML = personas.map(p=>`
        <div class="persona-card" onclick="loadPosts('${p.username}')">
          <div class="avatar-wrap">
            ${avatarHTML(p)}
            <div class="online-dot"></div>
          </div>
          <div class="persona-name">${esc(p.name)}</div>
          <div class="persona-title">${esc(p.title||'')}</div>
          <div class="persona-meta">
            <div class="persona-stat"><strong>${fmt(p.post_count||0)}</strong>posts</div>
            ${p.latest_post_date?`<div class="persona-stat"><strong>${timeAgo(p.latest_post_date)}</strong>last post</div>`:''}
          </div>
          <div class="monitored-badge">Monitored</div>
        </div>
      `).join('')+`
        <div class="persona-card add-card" onclick="openModal()">
          <div class="add-icon">＋</div>
          <div style="font-weight:700;font-size:14px">Track someone new</div>
          <div style="font-size:12px;margin-top:2px">Add a LinkedIn profile</div>
        </div>
      `;
    } catch(e) {
      grid.innerHTML=`<div class="error-msg">Failed to load. Please refresh.<br><small>${esc(e.message)}</small></div>`;
      document.getElementById('stats-chip').textContent='Error';
    }
  }

  async function loadPosts(username) {
    const p = _personas[username]||{};
    document.getElementById('personas-view').style.display='none';
    document.getElementById('posts-view').style.display='block';
    document.getElementById('posts-label').style.display='block';
    document.getElementById('person-header').innerHTML=`
      <div class="avatar-wrap">${avatarHTML(p,72)}</div>
      <div class="person-header-info">
        <h2>${esc(p.name||username)}</h2>
        <div class="subtitle">${esc(p.title||'')}</div>
        <a href="${esc(p.linkedin_url||'#')}" target="_blank">View LinkedIn profile
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 11L11 1"/><path d="M4 1h7v7"/></svg>
        </a>
      </div>
      <div class="header-stats">
        <div class="hstat"><strong>${fmt(p.post_count||0)}</strong><span>Posts</span></div>
        ${p.latest_post_date?`<div class="hstat"><strong>${timeAgo(p.latest_post_date)}</strong><span>Last Post</span></div>`:''}
      </div>
    `;
    const list=document.getElementById('posts-list');
    list.innerHTML='<div class="loading"><div class="spinner"></div>Loading posts…</div>';
    try {
      const posts=await fetch(BASE+'/posts/'+username+'.json?_='+Date.now()).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();});
      if(!posts.length){list.innerHTML='<div class="empty">No posts yet — check back after the next scan.</div>';return;}
      list.innerHTML=posts.map((post,i)=>{
        const text=post.text||'';
        const long=text.length>400;
        const repost=(post.post_type||'').match(/repost|quote/i);
        return `
          <div class="post-card">
            <div class="post-header">
              <div class="post-avatar">${p.profile_picture?`<img src="${esc(p.profile_picture)}" alt="" onerror="this.style.display='none'"/>`:''}</div>
              <div class="post-meta-info">
                <div class="post-author">${esc(p.name||username)}</div>
                <div class="post-date">${timeAgo(post.posted_at)} · ${post.posted_at?post.posted_at.split(' ')[0]:''}</div>
              </div>
              <span class="post-type-badge${repost?' repost':''}">${repost?'Repost':'Post'}</span>
            </div>
            <div class="post-text${long?' collapsed':''}" id="pt-${i}">${esc(text)}</div>
            ${long?`<span class="read-more" onclick="expand(${i},this)">Read more ↓</span>`:''}
            <div class="post-footer">
              <div class="post-stats">
                <div class="stat-item">👍 ${fmt(post.reactions)}</div>
                <div class="stat-item">💬 ${fmt(post.comments)}</div>
                <div class="stat-item">🔁 ${fmt(post.reposts)}</div>
              </div>
              <a class="post-link" href="${esc(post.url)}" target="_blank">View on LinkedIn</a>
            </div>
          </div>`;
      }).join('');
    } catch(e) {
      list.innerHTML=`<div class="error-msg">Could not load posts.<br><small>${esc(e.message)}</small></div>`;
    }
  }

  function expand(i,btn){document.getElementById('pt-'+i).classList.remove('collapsed');btn.remove();}

  function openModal(){
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('modal-url').value='';
    setModalStatus('','');
    document.getElementById('modal-submit-btn').disabled=false;
    setTimeout(()=>document.getElementById('modal-url').focus(),60);
  }
  function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
  function setModalStatus(msg,type){
    const el=document.getElementById('modal-status');
    el.textContent=msg;
    el.className='modal-status'+(type?' '+type:'');
  }
  async function submitAddPerson(){
    const url=document.getElementById('modal-url').value.trim();
    if(!url||!url.includes('linkedin.com/in/')){setModalStatus('Please enter a valid LinkedIn profile URL.','error');return;}
    const btn=document.getElementById('modal-submit-btn');
    btn.disabled=true;
    setModalStatus('Fetching profile and posts… ~30 seconds.','info');
    try{
      const resp=await fetch(API+'/api/add_persona',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({linkedin_url:url})});
      const data=await resp.json();
      if(data.ok){setModalStatus((data.message||'Added!')+' Refreshing in 3s…','success');setTimeout(()=>{closeModal();loadPersonas();},3000);}
      else{setModalStatus(data.error||'Something went wrong.','error');btn.disabled=false;}
    }catch(e){
      setModalStatus('Could not reach the server. Backend must be running.','error');btn.disabled=false;
    }
  }
  document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
  loadPersonas();
</script>
</body>
</html>
