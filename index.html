<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f6f9; color: #1a1a2e; min-height: 100vh; }
    header { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 18px 40px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 20px; font-weight: 700; color: #0a66c2; }
    header .meta { font-size: 13px; color: #6b7280; margin-left: auto; display: flex; gap: 16px; align-items: center; }
    .stat-chip { background: #eff6ff; color: #0a66c2; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .add-btn { background: #0a66c2; color: #fff; border: none; padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .add-btn:hover { background: #0858a8; }
    .container { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
    #personas-view h2 { font-size: 13px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 20px; }
    .personas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
    .persona-card { background: #fff; border-radius: 16px; padding: 28px 24px; cursor: pointer; border: 1px solid #e5e7eb; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px; }
    .persona-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(10,102,194,0.12); border-color: #0a66c2; }
    .persona-card.add-card { border: 2px dashed #d1d5db; cursor: pointer; color: #9ca3af; background: transparent; }
    .persona-card.add-card:hover { border-color: #0a66c2; color: #0a66c2; box-shadow: none; transform: none; }
    .avatar { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, #0a66c2, #0ea5e9); display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .persona-name { font-size: 17px; font-weight: 700; color: #111827; }
    .persona-title { font-size: 13px; color: #6b7280; line-height: 1.4; }
    .persona-stats { display: flex; gap: 12px; margin-top: 4px; }
    .persona-stat { font-size: 12px; color: #6b7280; }
    .persona-stat strong { color: #0a66c2; }
    .badge { background: #eff6ff; color: #0a66c2; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
    #posts-view { display: none; }
    .back-btn { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: #0a66c2; cursor: pointer; margin-bottom: 28px; padding: 8px 0; }
    .back-btn:hover { opacity: 0.75; }
    .person-header { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; background: #fff; border-radius: 16px; padding: 24px; border: 1px solid #e5e7eb; flex-wrap: wrap; }
    .person-header-info h2 { font-size: 22px; font-weight: 700; }
    .person-header-info p { font-size: 14px; color: #6b7280; margin-top: 3px; }
    .person-header-info a { font-size: 13px; color: #0a66c2; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-top: 6px; }
    .person-header-info a:hover { text-decoration: underline; }
    .header-count { margin-left: auto; text-align: right; }
    .header-count strong { font-size: 28px; font-weight: 800; color: #0a66c2; display: block; }
    .header-count span { font-size: 12px; color: #9ca3af; }
    .posts-list { display: flex; flex-direction: column; gap: 14px; }
    .post-card { background: #fff; border-radius: 14px; padding: 22px; border: 1px solid #e5e7eb; transition: box-shadow 0.15s; }
    .post-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    .post-date { font-size: 12px; color: #9ca3af; margin-bottom: 10px; }
    .post-text { font-size: 15px; line-height: 1.65; color: #111827; white-space: pre-wrap; word-break: break-word; }
    .post-text.collapsed { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
    .read-more { font-size: 13px; color: #0a66c2; cursor: pointer; font-weight: 600; margin-top: 8px; display: inline-block; }
    .post-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; padding-top: 14px; border-top: 1px solid #f3f4f6; flex-wrap: wrap; gap: 8px; }
    .post-stats { display: flex; gap: 14px; font-size: 13px; color: #6b7280; }
    .post-link { font-size: 13px; font-weight: 600; color: #0a66c2; text-decoration: none; padding: 6px 14px; border: 1.5px solid #0a66c2; border-radius: 20px; transition: all 0.15s; }
    .post-link:hover { background: #0a66c2; color: #fff; }
    .loading { text-align: center; padding: 60px 20px; color: #6b7280; font-size: 15px; }
    .spinner { width: 34px; height: 34px; border: 3px solid #e5e7eb; border-top-color: #0a66c2; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 60px 20px; color: #9ca3af; font-size: 15px; }
    .error-msg { text-align: center; padding: 40px 20px; color: #ef4444; font-size: 14px; background: #fef2f2; border-radius: 12px; border: 1px solid #fecaca; }
    .updated-note { font-size: 11px; color: #9ca3af; text-align: right; margin-top: -12px; margin-bottom: 20px; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 20px; padding: 36px; width: 100%; max-width: 480px; margin: 20px; }
    .modal h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .modal p { font-size: 14px; color: #6b7280; margin-bottom: 24px; }
    .modal input { width: 100%; border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 12px 16px; font-size: 15px; outline: none; transition: border-color 0.15s; margin-bottom: 16px; }
    .modal input:focus { border-color: #0a66c2; }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; }
    .modal-cancel { background: none; border: 1.5px solid #e5e7eb; color: #6b7280; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .modal-cancel:hover { border-color: #9ca3af; }
    .modal-submit { background: #0a66c2; color: #fff; border: none; padding: 10px 24px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .modal-submit:hover { background: #0858a8; }
    .modal-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .modal-status { font-size: 13px; margin-top: 12px; padding: 10px 14px; border-radius: 8px; display: none; }
    .modal-status.info { background: #eff6ff; color: #0a66c2; display: block; }
    .modal-status.error { background: #fef2f2; color: #ef4444; display: block; }
    .modal-status.success { background: #f0fdf4; color: #16a34a; display: block; }
  </style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="#0a66c2"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
  <h1>LinkedIn Tracker</h1>
  <div class="meta">
    <span id="stats-chip" class="stat-chip">Loading...</span>
    <button class="add-btn" onclick="openModal()">&#43; Add Person</button>
  </div>
</header>

<div class="container">
  <div id="personas-view">
    <h2>Monitored Personas</h2>
    <p class="updated-note" id="updated-note"></p>
    <div class="personas-grid" id="personas-grid">
      <div class="loading"><div class="spinner"></div>Loading...</div>
    </div>
  </div>

  <div id="posts-view">
    <div class="back-btn" onclick="showPersonas()">&#8592; All personas</div>
    <div class="person-header" id="person-header"></div>
    <div class="posts-list" id="posts-list">
      <div class="loading"><div class="spinner"></div>Loading posts...</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>Track a new person</h3>
    <p>Paste their LinkedIn profile URL and we'll start monitoring their posts daily.</p>
    <input type="url" id="modal-url" placeholder="https://www.linkedin.com/in/username" />
    <div id="modal-status" class="modal-status"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-submit" id="modal-submit-btn" onclick="submitAddPerson()">Start Tracking</button>
    </div>
  </div>
</div>

<script>
  const BASE = './data';
  const API = 'http://46.101.143.130:8766';
  const _personas = {};

  function initials(name) {
    return (name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function timeAgo(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    if (isNaN(d)) return dateStr;
    const diff = Math.floor((Date.now() - d) / 1000);
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function fmt(n) { return (n || 0).toLocaleString(); }

  function esc(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function showPersonas() {
    document.getElementById('personas-view').style.display = 'block';
    document.getElementById('posts-view').style.display = 'none';
  }

  async function loadPersonas() {
    const grid = document.getElementById('personas-grid');
    try {
      const [personas, stats] = await Promise.all([
        fetch(BASE + '/personas.json?_=' + Date.now()).then(r => { if (!r.ok) throw new Error('personas.json ' + r.status); return r.json(); }),
        fetch(BASE + '/stats.json?_=' + Date.now()).then(r => { if (!r.ok) throw new Error('stats.json ' + r.status); return r.json(); })
      ]);
      document.getElementById('stats-chip').textContent =
        stats.total_personas + ' persona' + (stats.total_personas !== 1 ? 's' : '') +
        ' \u00b7 ' + stats.total_posts + ' posts';
      personas.forEach(p => _personas[p.username] = p);
      grid.innerHTML = personas.map(p => `
        <div class="persona-card" onclick="loadPosts('${p.username}')">
          <div class="avatar">${initials(p.name)}</div>
          <div class="persona-name">${esc(p.name)}</div>
          <div class="persona-title">${esc(p.title || '')}</div>
          <div class="persona-stats">
            <div class="persona-stat"><strong>${p.post_count || 0}</strong> posts</div>
            ${p.latest_post_date ? '<div class="persona-stat">Last: ' + timeAgo(p.latest_post_date) + '</div>' : ''}
          </div>
          <div class="badge">&#x25cf; Monitored</div>
        </div>
      `).join('') + `
        <div class="persona-card add-card" onclick="openModal()">
          <div style="font-size:36px;margin-bottom:8px">&#43;</div>
          <div style="font-weight:600;font-size:15px">Track someone new</div>
          <div style="font-size:13px">Add a LinkedIn profile</div>
        </div>
      `;
    } catch (e) {
      grid.innerHTML = '<div class="error-msg">Failed to load data. Please refresh.<br><small>' + esc(e.message) + '</small></div>';
      document.getElementById('stats-chip').textContent = 'Error';
    }
  }

  async function loadPosts(username) {
    const persona = _personas[username] || {};
    document.getElementById('personas-view').style.display = 'none';
    document.getElementById('posts-view').style.display = 'block';
    document.getElementById('person-header').innerHTML = `
      <div class="avatar" style="width:60px;height:60px;font-size:22px">${initials(persona.name || username)}</div>
      <div class="person-header-info">
        <h2>${esc(persona.name || username)}</h2>
        <p>${esc(persona.title || '')}</p>
        <a href="${persona.linkedin_url || '#'}" target="_blank">View LinkedIn &#x2197;</a>
      </div>
      <div class="header-count">
        <strong>${persona.post_count || 0}</strong>
        <span>posts tracked</span>
      </div>
    `;
    const list = document.getElementById('posts-list');
    list.innerHTML = '<div class="loading"><div class="spinner"></div>Loading posts...</div>';
    try {
      const posts = await fetch(BASE + '/posts/' + username + '.json?_=' + Date.now())
        .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
      if (!posts.length) {
        list.innerHTML = '<div class="empty">No posts yet \u2014 check back after the next scan.</div>';
        return;
      }
      list.innerHTML = posts.map((post, i) => {
        const text = post.text || '';
        const needsExpand = text.length > 350;
        return `
          <div class="post-card">
            <div class="post-date">&#128197; ${timeAgo(post.posted_at)} &middot; ${post.posted_at ? post.posted_at.split(' ')[0] : ''}</div>
            <div class="post-text ${needsExpand ? 'collapsed' : ''}" id="pt-${i}">${esc(text)}</div>
            ${needsExpand ? '<span class="read-more" onclick="expand(' + i + ',this)">Read more</span>' : ''}
            <div class="post-footer">
              <div class="post-stats">
                <span>&#128077; ${fmt(post.reactions)}</span>
                <span>&#128172; ${fmt(post.comments)}</span>
                <span>&#128257; ${fmt(post.reposts)}</span>
              </div>
              <a class="post-link" href="${post.url}" target="_blank">View on LinkedIn</a>
            </div>
          </div>
        `;
      }).join('');
    } catch (e) {
      list.innerHTML = '<div class="error-msg">Could not load posts.<br><small>' + esc(e.message) + '</small></div>';
    }
  }

  function expand(i, btn) {
    document.getElementById('pt-' + i).classList.remove('collapsed');
    btn.remove();
  }

  function openModal() {
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('modal-url').value = '';
    setModalStatus('', '');
    document.getElementById('modal-submit-btn').disabled = false;
    setTimeout(() => document.getElementById('modal-url').focus(), 50);
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  function setModalStatus(msg, type) {
    const el = document.getElementById('modal-status');
    el.textContent = msg;
    el.className = 'modal-status' + (type ? ' ' + type : '');
  }

  async function submitAddPerson() {
    const url = document.getElementById('modal-url').value.trim();
    if (!url || !url.includes('linkedin.com/in/')) {
      setModalStatus('Please enter a valid LinkedIn profile URL.', 'error');
      return;
    }
    const btn = document.getElementById('modal-submit-btn');
    btn.disabled = true;
    setModalStatus('Fetching profile and posts\u2026 this may take ~30 seconds.', 'info');
    try {
      const resp = await fetch(API + '/api/add_persona', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ linkedin_url: url })
      });
      const data = await resp.json();
      if (data.ok) {
        setModalStatus((data.message || 'Added!') + ' Refreshing in 3s...', 'success');
        setTimeout(() => { closeModal(); loadPersonas(); }, 3000);
      } else {
        setModalStatus(data.error || 'Something went wrong.', 'error');
        btn.disabled = false;
      }
    } catch (e) {
      setModalStatus('Could not reach the server. Backend must be running to add personas.', 'error');
      btn.disabled = false;
    }
  }

  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  loadPersonas();
</script>
</body>
</html>
