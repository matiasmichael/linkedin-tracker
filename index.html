<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn Tracker — Clarity</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:        #0a1628;
      --green:       #61F393;
      --green-muted: #E8FFF0;
      --green-glow:  rgba(97,243,147,0.25);
      --white:       #FFFFFF;
      --bg:          #F0F4F8;
      --border:      #E2E8F0;
      --muted:       #64748B;
      --faint:       #94A3B8;
      --danger:      #EF4444;
      --danger-muted:#FEE2E2;
      --shadow-sm:   0 1px 3px rgba(10,22,40,.07);
      --shadow-md:   0 4px 18px rgba(10,22,40,.09);
      --shadow-lg:   0 12px 40px rgba(10,22,40,.13);
      --radius:      16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--navy); min-height: 100vh; }
    header { background: var(--navy); padding: 0 40px; height: 64px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 50; box-shadow: 0 2px 16px rgba(10,22,40,.18); }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-star { width: 28px; height: 28px; color: var(--green); flex-shrink: 0; }
    header .wordmark { font-size: 16px; font-weight: 800; color: var(--white); letter-spacing: -0.3px; }
    header .divider { width: 1px; height: 20px; background: rgba(255,255,255,.18); margin: 0 4px; }
    header .sub-label { font-size: 13px; font-weight: 600; color: rgba(255,255,255,.5); letter-spacing: 0.02em; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .stat-pill { background: rgba(97,243,147,.12); color: var(--green); padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; letter-spacing: 0.03em; }
    .add-btn { background: var(--green); color: var(--navy); border: none; padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: opacity .15s, transform .1s; font-family: inherit; }
    .add-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .container { max-width: 1140px; margin: 0 auto; padding: 40px 24px 80px; }
    .section-label { font-size: 0.65rem; font-weight: 700; color: var(--faint); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 20px; }
    .personas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
    .persona-card { background: var(--white); border-radius: var(--radius); padding: 28px 24px 24px; cursor: pointer; border: 1.5px solid var(--border); transition: all .2s cubic-bezier(.22,.68,0,1.2); display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px; position: relative; overflow: hidden; }
    .persona-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--green); opacity: 0; transition: opacity .2s; }
    .persona-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--green); }
    .persona-card:hover::before { opacity: 1; }
    .avatar-wrap { position: relative; margin-bottom: 4px; }
    .avatar { width: 76px; height: 76px; border-radius: 50%; background: var(--navy); display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 800; color: var(--green); flex-shrink: 0; overflow: hidden; border: 3px solid var(--white); box-shadow: 0 0 0 2px var(--green), var(--shadow-sm); }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .online-dot { position: absolute; bottom: 3px; right: 3px; width: 13px; height: 13px; background: var(--green); border-radius: 50%; border: 2px solid var(--white); box-shadow: 0 0 6px var(--green-glow); }
    .persona-name { font-size: 16px; font-weight: 700; color: var(--navy); }
    .persona-title { font-size: 12px; color: var(--muted); line-height: 1.5; max-width: 200px; }
    .persona-meta { display: flex; gap: 20px; margin-top: 6px; }
    .persona-stat { font-size: 12px; color: var(--muted); display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .persona-stat strong { font-size: 18px; font-weight: 800; color: var(--navy); line-height: 1; }
    .monitored-badge { display: inline-flex; align-items: center; gap: 5px; background: var(--green-muted); color: #1a7a45; font-size: 11px; font-weight: 700; padding: 4px 11px; border-radius: 20px; margin-top: 2px; letter-spacing: 0.02em; }
    .monitored-badge::before { content: ''; width: 6px; height: 6px; background: var(--green); border-radius: 50%; box-shadow: 0 0 4px var(--green-glow); }
    .add-card { border: 2px dashed var(--border); background: transparent; color: var(--faint); }
    .add-card:hover { border-color: var(--green); color: var(--navy); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .add-card:hover::before { opacity: 0; }
    .add-icon { font-size: 30px; line-height: 1; margin-bottom: 4px; color: var(--green); }
    .add-card:not(:hover) .add-icon { color: var(--faint); }
    #posts-view { display: none; animation: fadeIn .22s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .back-btn { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--muted); cursor: pointer; margin-bottom: 24px; padding: 6px 0; transition: color .15s; font-family: inherit; background: none; border: none; letter-spacing: 0.02em; }
    .back-btn:hover { color: var(--navy); }
    .person-header { display: flex; align-items: center; gap: 24px; margin-bottom: 32px; background: var(--navy); border-radius: var(--radius); padding: 28px 32px; box-shadow: var(--shadow-md); flex-wrap: wrap; position: relative; overflow: hidden; }
    .person-header::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--green); }
    .person-header .avatar { width: 72px; height: 72px; font-size: 24px; box-shadow: 0 0 0 2px var(--green), 0 4px 16px var(--green-glow); }
    .person-header-info h2 { font-size: 22px; font-weight: 800; color: var(--white); letter-spacing: -0.3px; }
    .person-header-info .subtitle { font-size: 14px; color: rgba(255,255,255,.55); margin-top: 3px; }
    .person-header-info a { font-size: 12px; color: var(--green); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-top: 10px; font-weight: 700; letter-spacing: 0.03em; }
    .person-header-info a:hover { text-decoration: underline; }
    .header-stats { margin-left: auto; display: flex; gap: 36px; }
    .hstat { text-align: center; }
    .hstat strong { font-size: 30px; font-weight: 800; color: var(--green); display: block; letter-spacing: -1px; }
    .hstat span { font-size: 0.65rem; color: rgba(255,255,255,.45); font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }
    .posts-list { display: flex; flex-direction: column; gap: 14px; }
    .post-card { background: var(--white); border-radius: 14px; padding: 24px; border: 1.5px solid var(--border); transition: box-shadow .15s, border-color .15s; }
    .post-card:hover { box-shadow: var(--shadow-md); border-color: #CBD5E1; }
    .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .post-avatar { width: 36px; height: 36px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: var(--navy); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: var(--green); }
    .post-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .post-meta-info { flex: 1; }
    .post-author { font-size: 13px; font-weight: 700; color: var(--navy); }
    .post-date { font-size: 12px; color: var(--faint); margin-top: 1px; }
    .post-type-badge { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; padding: 3px 9px; border-radius: 6px; background: var(--green-muted); color: #1a7a45; }
    .post-type-badge.repost { background: #FEF3C7; color: #B45309; }
    .post-text { font-size: 14px; line-height: 1.75; color: var(--navy); white-space: pre-wrap; word-break: break-word; }
    .post-text.collapsed { display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }
    .read-more { font-size: 13px; color: var(--navy); cursor: pointer; font-weight: 700; margin-top: 8px; display: inline-block; border-bottom: 2px solid var(--green); padding-bottom: 1px; transition: opacity .15s; }
    .read-more:hover { opacity: .7; }
    .post-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--bg); flex-wrap: wrap; gap: 10px; }
    .post-stats { display: flex; gap: 18px; }
    .stat-item { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--muted); font-weight: 600; }
    .post-link { font-size: 12px; font-weight: 700; color: var(--navy); text-decoration: none; padding: 6px 16px; border: 1.5px solid var(--navy); border-radius: 20px; transition: all .15s; letter-spacing: 0.03em; }
    .post-link:hover { background: var(--navy); color: var(--white); }
    .loading { text-align: center; padding: 80px 20px; color: var(--muted); font-size: 15px; font-weight: 500; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 60px 20px; color: var(--faint); font-size: 15px; font-weight: 500; }
    .error-msg { text-align: center; padding: 32px 20px; color: var(--danger); font-size: 14px; background: var(--danger-muted); border-radius: 12px; border: 1px solid #FECACA; line-height: 1.6; font-weight: 500; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(10,22,40,.6); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(6px); }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--white); border-radius: 20px; padding: 40px; width: 100%; max-width: 480px; margin: 20px; box-shadow: 0 24px 80px rgba(10,22,40,.25); animation: modalIn .22s cubic-bezier(.22,.68,0,1.2); }
    @keyframes modalIn { from { opacity: 0; transform: scale(.95) translateY(10px); } to { opacity: 1; transform: none; } }
    .modal-header { margin-bottom: 24px; }
    .modal-header h3 { font-size: 20px; font-weight: 800; color: var(--navy); letter-spacing: -0.3px; }
    .modal-header p { font-size: 14px; color: var(--muted); margin-top: 6px; line-height: 1.6; }
    .modal-input-wrap { position: relative; }
    .modal-input-wrap .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--faint); font-size: 15px; pointer-events: none; }
    .modal input { width: 100%; border: 1.5px solid var(--border); border-radius: 12px; padding: 13px 16px 13px 42px; font-size: 14px; outline: none; transition: border-color .15s, box-shadow .15s; color: var(--navy); background: var(--bg); font-family: inherit; font-weight: 500; }
    .modal input:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-glow); background: var(--white); }
    .modal input::placeholder { color: var(--faint); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .modal-cancel { background: none; border: 1.5px solid var(--border); color: var(--muted); padding: 10px 22px; border-radius: 20px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: border-color .15s; }
    .modal-cancel:hover { border-color: var(--muted); }
    .modal-submit { background: var(--navy); color: var(--white); border: none; padding: 10px 26px; border-radius: 20px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background .15s, opacity .15s; font-family: inherit; }
    .modal-submit:hover { background: #0f2040; }
    .modal-submit:disabled { opacity: .5; cursor: not-allowed; }
    .modal-status { font-size: 13px; margin-top: 14px; padding: 11px 16px; border-radius: 10px; display: none; line-height: 1.5; font-weight: 600; }
    .modal-status.info { background: var(--green-muted); color: #1a7a45; display: block; }
    .modal-status.error { background: var(--danger-muted); color: var(--danger); display: block; }
    .modal-status.success { background: var(--green-muted); color: #1a7a45; display: block; }
    @media (max-width: 640px) {
      header { padding: 0 20px; }
      header .sub-label { display: none; }
      .container { padding: 24px 16px 60px; }
      .personas-grid { grid-template-columns: 1fr 1fr; gap: 14px; }
      .persona-card { padding: 20px 16px; }
      .person-header { padding: 20px; gap: 16px; }
      .header-stats { gap: 20px; }
      .hstat strong { font-size: 24px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg class="logo-star" viewBox="0 0 56 56" fill="none">
      <path d="M39.48 16.28L32.35 0L27.81 10.48L33.1 22.71L45.23 28.05L55.63 23.47L39.48 16.28Z" fill="currentColor"/>
      <path d="M39.48 39.81L55.62 32.62L45.24 28.05L33.11 33.38L27.81 45.62L32.35 56.1L39.48 39.81Z" fill="currentColor"/>
      <path d="M16.15 39.82L23.28 56.1L27.82 45.62L22.53 33.39L10.4 28.05L0 32.62L16.15 39.82Z" fill="currentColor"/>
      <path d="M16.15 16.28L0 23.48L10.39 28.05L22.52 22.71L27.81 10.48L23.28 0L16.15 16.28Z" fill="currentColor"/>
    </svg>
    <span class="wordmark">Clarity</span>
  </div>
  <div class="divider"></div>
  <span class="sub-label">LinkedIn Tracker</span>
  <div class="header-right">
    <span id="stats-chip" class="stat-pill">Loading…</span>
    <button class="add-btn" onclick="openModal()">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
      Add Person
    </button>
  </div>
</header>

<div class="container">
  <div id="personas-view">
    <div class="section-label">Monitored Profiles</div>
    <div class="personas-grid" id="personas-grid">
      <div class="loading"><div class="spinner"></div>Loading…</div>
    </div>
  </div>
  <div id="posts-view">
    <button class="back-btn" id="back-btn">&#8592; All profiles</button>
    <div class="person-header" id="person-header"></div>
    <div class="section-label" id="posts-section-label" style="display:none">Recent Posts</div>
    <div class="posts-list" id="posts-list">
      <div class="loading"><div class="spinner"></div>Loading posts…</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3>Track a new person</h3>
      <p>Paste their LinkedIn profile URL. We’ll scrape their posts and add them to the daily monitor.</p>
    </div>
    <div class="modal-input-wrap">
      <span class="input-icon">&#128279;</span>
      <input type="url" id="modal-url" placeholder="https://www.linkedin.com/in/username" />
    </div>
    <div id="modal-status" class="modal-status"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-submit" id="modal-submit-btn" onclick="submitAddPerson()">Start Tracking</button>
    </div>
  </div>
</div>

<script>
  const DATA_BASE = '/data';
  const API = 'http://46.101.143.130:8766';
  const _personas = {};
  const SITE_BASE = '';

  function initials(name) { return (name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
  function timeAgo(ds) {
    if (!ds) return ''; const d = new Date(ds); if (isNaN(d)) return ds;
    const s = Math.floor((Date.now()-d)/1000);
    if (s<3600) return Math.floor(s/60)+'m ago';
    if (s<86400) return Math.floor(s/3600)+'h ago';
    if (s<604800) return Math.floor(s/86400)+'d ago';
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  }
  function fmt(n){return(n||0).toLocaleString();}
  function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function avatarHTML(p,size){
    const st=size?`style="width:${size}px;height:${size}px;font-size:${Math.round(size*.34)}px"`:'';    if(p&&p.profile_picture)return`<div class="avatar" ${st}><img src="${esc(p.profile_picture)}" alt="${esc(p.name||'')}" onerror="this.parentNode.innerHTML='${initials(p.name)}'"/></div>`;
    return`<div class="avatar" ${st}>${initials(p&&p.name)}</div>`;
  }

  function navigate(route, push=true) {
    const fullPath = SITE_BASE + (route || '/');
    if (push) history.pushState({}, '', fullPath);
    const m = route.match(/^\/person\/([^/?#]+)/);
    if (m) renderPostsView(m[1]); else renderPersonasView();
  }

  function currentRoute() {
    const path = location.pathname;
    return (SITE_BASE && path.startsWith(SITE_BASE)) ? path.slice(SITE_BASE.length) || '/' : path;
  }

  window.addEventListener('popstate', () => navigate(currentRoute(), false));
  document.getElementById('back-btn').onclick = () => navigate('/');

  function renderPersonasView() {
    document.getElementById('personas-view').style.display='block';
    document.getElementById('posts-view').style.display='none';
    document.title='LinkedIn Tracker \u2014 Clarity';
  }
  function renderPostsView(username) {
    document.getElementById('personas-view').style.display='none';
    document.getElementById('posts-view').style.display='block';
    document.getElementById('posts-section-label').style.display='block';
    loadPosts(username);
  }

  async function loadPersonas() {
    const grid=document.getElementById('personas-grid');
    try {
      const [personas,stats]=await Promise.all([
        fetch(DATA_BASE+'/personas.json?_='+Date.now()).then(r=>{if(!r.ok)throw new Error('personas '+r.status);return r.json();}),
        fetch(DATA_BASE+'/stats.json?_='+Date.now()).then(r=>{if(!r.ok)throw new Error('stats '+r.status);return r.json();})
      ]);
      document.getElementById('stats-chip').textContent=stats.total_personas+' persona'+(stats.total_personas!==1?'s':'')+' \u00b7 '+stats.total_posts+' posts';
      personas.forEach(p=>_personas[p.username]=p);
      grid.innerHTML=personas.map(p=>`
        <div class="persona-card" onclick="navigate('/person/${p.username}')">
          <div class="avatar-wrap">${avatarHTML(p)}<div class="online-dot"></div></div>
          <div class="persona-name">${esc(p.name)}</div>
          <div class="persona-title">${esc(p.title||'')}</div>
          <div class="persona-meta">
            <div class="persona-stat"><strong>${fmt(p.post_count||0)}</strong>posts</div>
            ${p.latest_post_date?`<div class="persona-stat"><strong>${timeAgo(p.latest_post_date)}</strong>last post</div>`:''}
          </div>
          <div class="monitored-badge">Monitored</div>
        </div>`).join('')+`
        <div class="persona-card add-card" onclick="openModal()">
          <div class="add-icon">&#65291;</div>
          <div style="font-weight:700;font-size:14px;color:var(--navy)">Track someone new</div>
          <div style="font-size:12px;margin-top:2px">Add a LinkedIn profile</div>
        </div>`;
      navigate(currentRoute(), false);
    } catch(e) {
      grid.innerHTML=`<div class="error-msg">Failed to load data. Please refresh.<br><small>${esc(e.message)}</small></div>`;
      document.getElementById('stats-chip').textContent='Error';
    }
  }

  async function loadPosts(username) {
    const p=_personas[username]||{username};
    document.title=(p.name||username)+' \u2014 LinkedIn Tracker';
    document.getElementById('person-header').innerHTML=`
      <div class="avatar-wrap">${avatarHTML(p,72)}</div>
      <div class="person-header-info">
        <h2>${esc(p.name||username)}</h2>
        <div class="subtitle">${esc(p.title||'')}</div>
        <a href="${esc(p.linkedin_url||'#')}" target="_blank" rel="noopener">View LinkedIn profile
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 11L11 1"/><path d="M4 1h7v7"/></svg>
        </a>
      </div>
      <div class="header-stats">
        <div class="hstat"><strong>${fmt(p.post_count||0)}</strong><span>Posts</span></div>
        ${p.latest_post_date?`<div class="hstat"><strong>${timeAgo(p.latest_post_date)}</strong><span>Last Post</span></div>`:''}
      </div>`;
    const list=document.getElementById('posts-list');
    list.innerHTML='<div class="loading"><div class="spinner"></div>Loading posts…</div>';
    try {
      const posts=await fetch(DATA_BASE+'/posts/'+username+'.json?_='+Date.now()).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();});
      if(!posts.length){list.innerHTML='<div class="empty">No posts yet \u2014 check back after the next scan.</div>';return;}
      list.innerHTML=posts.map((post,i)=>{
        const text=post.text||'',long=text.length>400,repost=/repost|quote/i.test(post.post_type||'');
        return`<div class="post-card">
            <div class="post-header">
              <div class="post-avatar">${p.profile_picture?`<img src="${esc(p.profile_picture)}" alt="" onerror="this.parentNode.innerHTML='${initials(p.name)}'"/>`:initials(p.name)}</div>
              <div class="post-meta-info"><div class="post-author">${esc(p.name||username)}</div><div class="post-date">${timeAgo(post.posted_at)} \u00b7 ${post.posted_at?post.posted_at.split(' ')[0]:''}</div></div>
              <span class="post-type-badge${repost?' repost':''}">${repost?'Repost':'Post'}</span>
            </div>
            <div class="post-text${long?' collapsed':''}" id="pt-${i}">${esc(text)}</div>
            ${long?`<span class="read-more" onclick="expand(${i},this)">Read more &#8595;</span>`:''}
            <div class="post-footer">
              <div class="post-stats"><div class="stat-item">&#128077; ${fmt(post.reactions)}</div><div class="stat-item">&#128172; ${fmt(post.comments)}</div><div class="stat-item">&#128257; ${fmt(post.reposts)}</div></div>
              <a class="post-link" href="${esc(post.url)}" target="_blank" rel="noopener">View on LinkedIn</a>
            </div></div>`;
      }).join('');
    } catch(e){
      list.innerHTML=`<div class="error-msg">Could not load posts.<br><small>${esc(e.message)}</small></div>`;
    }
  }

  function expand(i,btn){document.getElementById('pt-'+i).classList.remove('collapsed');btn.remove();}

  function openModal(){document.getElementById('modal-overlay').classList.add('open');document.getElementById('modal-url').value='';setModalStatus('','');document.getElementById('modal-submit-btn').disabled=false;setTimeout(()=>document.getElementById('modal-url').focus(),60);}
  function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
  function setModalStatus(msg,type){const el=document.getElementById('modal-status');el.textContent=msg;el.className='modal-status'+(type?' '+type:'');}
  async function submitAddPerson(){
    const url=document.getElementById('modal-url').value.trim();
    if(!url||!url.includes('linkedin.com/in/')){setModalStatus('Please enter a valid LinkedIn profile URL.','error');return;}
    const btn=document.getElementById('modal-submit-btn');btn.disabled=true;
    setModalStatus('Fetching profile and posts\u2026 ~30 seconds.','info');
    try{
      const resp=await fetch(API+'/api/add_persona',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({linkedin_url:url})});
      const data=await resp.json();
      if(data.ok){setModalStatus((data.message||'Added!')+' Refreshing in 3s\u2026','success');setTimeout(()=>{closeModal();loadPersonas();},3000);}
      else{setModalStatus(data.error||'Something went wrong.','error');btn.disabled=false;}
    }catch(e){setModalStatus('Could not reach the server. Backend must be running.','error');btn.disabled=false;}
  }
  document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

  loadPersonas();
</script>
</body>
</html>
