<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 18px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 20px; font-weight: 700; color: #0a66c2; }
    header .meta { font-size: 13px; color: #6b7280; margin-left: auto; display: flex; gap: 20px; align-items: center; }
    .stat-chip { background: #eff6ff; color: #0a66c2; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }

    .container { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

    #personas-view h2 { font-size: 13px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 20px; }
    .personas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }

    .persona-card {
      background: #fff; border-radius: 16px; padding: 28px 24px;
      cursor: pointer; border: 1px solid #e5e7eb;
      transition: all 0.2s; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px;
    }
    .persona-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(10,102,194,0.12); border-color: #0a66c2; }

    .avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, #0a66c2, #0ea5e9);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .persona-name { font-size: 17px; font-weight: 700; color: #111827; }
    .persona-title { font-size: 13px; color: #6b7280; line-height: 1.4; }
    .persona-stats { display: flex; gap: 12px; margin-top: 4px; }
    .persona-stat { font-size: 12px; color: #6b7280; }
    .persona-stat strong { color: #0a66c2; }
    .badge { background: #eff6ff; color: #0a66c2; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }

    #posts-view { display: none; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 14px; font-weight: 600; color: #0a66c2;
      cursor: pointer; margin-bottom: 28px; padding: 8px 0;
    }
    .back-btn:hover { opacity: 0.75; }

    .person-header {
      display: flex; align-items: center; gap: 20px;
      margin-bottom: 28px; background: #fff;
      border-radius: 16px; padding: 24px; border: 1px solid #e5e7eb;
    }
    .person-header .avatar { width: 60px; height: 60px; font-size: 22px; }
    .person-header-info h2 { font-size: 22px; font-weight: 700; }
    .person-header-info p { font-size: 14px; color: #6b7280; margin-top: 3px; }
    .person-header-info a {
      font-size: 13px; color: #0a66c2; text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px; margin-top: 6px;
    }
    .person-header-info a:hover { text-decoration: underline; }
    .header-count { margin-left: auto; text-align: right; }
    .header-count strong { font-size: 28px; font-weight: 800; color: #0a66c2; display: block; }
    .header-count span { font-size: 12px; color: #9ca3af; }

    .posts-list { display: flex; flex-direction: column; gap: 14px; }
    .post-card {
      background: #fff; border-radius: 14px; padding: 22px;
      border: 1px solid #e5e7eb; transition: box-shadow 0.15s;
    }
    .post-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    .post-date { font-size: 12px; color: #9ca3af; margin-bottom: 10px; }
    .post-text { font-size: 15px; line-height: 1.65; color: #111827; white-space: pre-wrap; word-break: break-word; }
    .post-text.collapsed { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
    .read-more { font-size: 13px; color: #0a66c2; cursor: pointer; font-weight: 600; margin-top: 8px; display: inline-block; }
    .post-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; padding-top: 14px; border-top: 1px solid #f3f4f6; }
    .post-stats { display: flex; gap: 14px; font-size: 13px; color: #6b7280; }
    .post-link { font-size: 13px; font-weight: 600; color: #0a66c2; text-decoration: none; padding: 6px 14px; border: 1.5px solid #0a66c2; border-radius: 20px; transition: all 0.15s; }
    .post-link:hover { background: #0a66c2; color: #fff; }

    .loading { text-align: center; padding: 60px 20px; color: #6b7280; font-size: 15px; }
    .spinner { width: 34px; height: 34px; border: 3px solid #e5e7eb; border-top-color: #0a66c2; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 60px 20px; color: #9ca3af; font-size: 15px; }
  </style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="#0a66c2"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
  <h1>LinkedIn Tracker</h1>
  <div class="meta">
    <span id="stats-chip" class="stat-chip">Loading...</span>
    <span id="last-updated" style="color:#9ca3af;font-size:12px"></span>
  </div>
</header>

<div class="container">
  <div id="personas-view">
    <h2>Monitored Personas</h2>
    <div class="personas-grid" id="personas-grid">
      <div class="loading"><div class="spinner"></div>Loading...</div>
    </div>
  </div>

  <div id="posts-view">
    <div class="back-btn" onclick="showPersonas()">← All personas</div>
    <div class="person-header" id="person-header"></div>
    <div class="posts-list" id="posts-list">
      <div class="loading"><div class="spinner"></div>Loading posts...</div>
    </div>
  </div>
</div>

<script>
  const API = 'http://46.101.143.130:8766';

  function initials(name) {
    return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function timeAgo(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    const diff = Math.floor((Date.now() - d) / 1000);
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    if (diff < 604800) return `${Math.floor(diff/86400)}d ago`;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function fmt(n) { return (n||0).toLocaleString(); }

  function showPersonas() {
    document.getElementById('personas-view').style.display = 'block';
    document.getElementById('posts-view').style.display = 'none';
  }

  async function loadPersonas() {
    const [personas, stats] = await Promise.all([
      fetch(`${API}/api/personas`).then(r => r.json()),
      fetch(`${API}/api/stats`).then(r => r.json())
    ]);

    document.getElementById('stats-chip').textContent =
      `${stats.total_personas} persona${stats.total_personas !== 1 ? 's' : ''} · ${stats.total_posts} posts`;
    document.getElementById('last-updated').textContent =
      `Updated ${new Date().toLocaleTimeString()}`;

    const grid = document.getElementById('personas-grid');
    grid.innerHTML = personas.map(p => `
      <div class="persona-card" onclick="loadPosts('${p.username}', ${JSON.stringify(p).replace(/'/g,"&#39;")})">
        <div class="avatar">${initials(p.name)}</div>
        <div class="persona-name">${p.name}</div>
        <div class="persona-title">${p.title}</div>
        <div class="persona-stats">
          <div class="persona-stat"><strong>${p.post_count || 0}</strong> posts</div>
          ${p.latest_post_date ? `<div class="persona-stat">Last: ${timeAgo(p.latest_post_date)}</div>` : ''}
        </div>
        <div class="badge">● Monitored</div>
      </div>
    `).join('');
  }

  async function loadPosts(username, persona) {
    document.getElementById('personas-view').style.display = 'none';
    document.getElementById('posts-view').style.display = 'block';

    document.getElementById('person-header').innerHTML = `
      <div class="avatar" style="width:60px;height:60px;font-size:22px">${initials(persona.name)}</div>
      <div class="person-header-info">
        <h2>${persona.name}</h2>
        <p>${persona.title}</p>
        <a href="${persona.linkedin_url}" target="_blank">View LinkedIn ↗</a>
      </div>
      <div class="header-count">
        <strong>${persona.post_count || 0}</strong>
        <span>posts tracked</span>
      </div>
    `;

    const list = document.getElementById('posts-list');
    list.innerHTML = '<div class="loading"><div class="spinner"></div>Loading posts from database...</div>';

    const posts = await fetch(`${API}/api/posts/${username}`).then(r => r.json());

    if (!posts.length) {
      list.innerHTML = '<div class="empty">No posts yet.</div>';
      return;
    }

    list.innerHTML = posts.map((post, i) => {
      const text = post.text || '';
      const needsExpand = text.length > 350;
      return `
        <div class="post-card">
          <div class="post-date">📅 ${timeAgo(post.posted_at)} · ${post.posted_at ? post.posted_at.split(' ')[0] : ''}</div>
          <div class="post-text ${needsExpand ? 'collapsed' : ''}" id="pt-${i}">${escHtml(text)}</div>
          ${needsExpand ? `<span class="read-more" onclick="expand(${i},this)">Read more</span>` : ''}
          <div class="post-footer">
            <div class="post-stats">
              <span>👍 ${fmt(post.reactions)}</span>
              <span>💬 ${fmt(post.comments)}</span>
              <span>🔁 ${fmt(post.reposts)}</span>
            </div>
            <a class="post-link" href="${post.url}" target="_blank">View on LinkedIn</a>
          </div>
        </div>
      `;
    }).join('');
  }

  function expand(i, btn) {
    document.getElementById(`pt-${i}`).classList.remove('collapsed');
    btn.remove();
  }

  function escHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  loadPersonas();
</script>
</body>
</html>
